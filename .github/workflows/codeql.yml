name: CodeQL SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan every Monday at 02:17 UTC
    - cron: '17 2 * * 1'

# Deny all permissions by default; job grants only what CodeQL needs.
permissions: {}

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: sapience-default
    timeout-minutes: 30

    permissions:
      contents: read          # checkout
      security-events: write  # upload SARIF results to GitHub Security tab
      actions: read           # required by CodeQL to enumerate workflow runs

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript  # covers both .js and .ts source
          - actions                # covers GitHub Actions workflow security

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          languages: ${{ matrix.language }}
          # security-extended covers injection, path traversal, prototype pollution —
          # all directly relevant to a prompt-injection / guardrail middleware library.
          queries: security-extended

      # Autobuild compiles the project; for TypeScript it runs `npm ci && tsc`.
      - name: Autobuild
        uses: github/codeql-action/autobuild@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          category: "/language:${{ matrix.language }}"
          upload: always
