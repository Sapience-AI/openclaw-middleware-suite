name: DCO

# Verify every commit in a pull request carries a `Signed-off-by:`
# trailer (Developer Certificate of Origin v1.1). See
# [CONTRIBUTING.md](../../CONTRIBUTING.md#contributor-sign-off-dco)
# for the contributor-facing instructions and the DCO text.
#
# Implementation note: this is a self-contained shell check rather than
# a third-party action. It walks the commits between the PR's base and
# head SHAs, greps each commit message for the trailer, and emits one
# GitHub Actions error annotation per missing sign-off. Avoids pinning
# a third-party action solely for a `git log | grep` pattern.

on:
  pull_request:
    branches: [main]

# Deny by default; the job only needs to read repo contents.
permissions: {}

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need full history so `git rev-list base..head` works for
          # PRs whose base may be many commits behind.
          fetch-depth: 0

      - name: Verify DCO sign-off on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          total=0
          for sha in $(git rev-list "$BASE_SHA..$HEAD_SHA"); do
            total=$((total + 1))
            if ! git show -s --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              author=$(git show -s --format='%an <%ae>' "$sha")
              subject=$(git show -s --format=%s "$sha")
              echo "::error::Commit $sha missing Signed-off-by trailer (author: $author, subject: $subject)"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing of $total commit(s) in this PR are missing the DCO sign-off."
            echo "::error::Fix with 'git commit --amend --signoff' (single commit) or 'git rebase HEAD~N --signoff' (multiple)."
            echo "::error::See CONTRIBUTING.md → Contributor sign-off (DCO) for full instructions."
            exit 1
          fi
          echo "All $total commit(s) carry a Signed-off-by trailer."
