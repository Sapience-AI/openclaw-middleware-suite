name: Dependency Review

on:
  pull_request:
    branches: [main]

# Deny all; this job only needs to read repo contents.
permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read          # access dependency graph
      pull-requests: write    # post inline PR comment with findings

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          # Block PRs that introduce HIGH or CRITICAL CVEs
          fail-on-severity: high

          # Block copyleft licenses incompatible with Apache-2.0
          deny-licenses: GPL-2.0, GPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0, AGPL-3.0

          # Post a summary comment on the PR
          comment-summary-in-pr: always

          # Warn (don't fail) on packages with low OpenSSF scorecard scores
          warn-on-openssf-scorecard-level: 3
