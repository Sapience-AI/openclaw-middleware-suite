# .github/workflows/trufflehog.yml
# Secret scanning with TruffleHog OSS — complements Gitleaks with VERIFIED credential
# detection (tests whether a leaked token still works via HTTP probes).
#
# Why both this and Gitleaks?
#   Gitleaks: fast, pattern-based, runs on every PR. Catches candidates.
#   TruffleHog --only-verified: slower, actively tests tokens. Anything that surfaces
#     here is a CONFIRMED live leaked credential and must be treated as an incident.
#
# Behavior:
#   - On push to default branch: scan full git history with --only-verified.
#   - On schedule (nightly): re-scan to catch tokens that became valid after commit
#     (e.g., token issued post-merge, or provider rotation cadence).
#   - Confirmed findings auto-create an issue AND post an alert to #product-security-alerts in Slack.
#
# Required permissions:
#   - contents: read
#   - issues: write      (to file the incident issue)
#
# Required secrets:
#   - SLACK_WEBHOOK_URL   (Incoming Webhook URL for #product-security-alerts — optional; if absent, skip alert)

name: trufflehog

# Push auto-trigger removed — this file is called by the security tier orchestrators:
#   security-tier2-pr-gate.yml       (PR to main — BLOCKING)
#   security-tier3-main-baseline.yml (push to main)
# Nightly schedule retained: re-scans full history to catch tokens that became
# valid AFTER the commit (e.g., token issued post-merge, provider rotation).
# This is a unique value the tier runs cannot provide at merge time.
on:
  workflow_call:
  schedule:
    # Nightly full-history re-scan — 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: trufflehog-${{ github.ref }}
  # Don't cancel in progress — we want every scheduled run to complete.
  cancel-in-progress: false

jobs:
  trufflehog:
    name: TruffleHog verified-credential scan
    # Self-hosted GKE runner — trufflehog is pre-installed in the runner image.
    # ARC scale-set routing: bare scale set name only (label arrays require minRunners>=1).
    runs-on: sapience-default
    timeout-minutes: 45

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run TruffleHog (verified only)
        id: trufflehog
        # Use the pre-installed binary directly — NOT the trufflesecurity/trufflehog
        # GitHub Action, which shells out to `docker run` internally and fails on
        # self-hosted runners without a Docker daemon (our pods are non-root containers;
        # DinD is intentionally stripped as an attack surface reduction).
        # trufflehog is baked into the runner image — see gcp-runners/runner-image/Dockerfile.
        run: |
          trufflehog git "file://$(pwd)" \
            --only-verified --json --no-update \
            > trufflehog.jsonl || true
          echo "Findings count: $(wc -l < trufflehog.jsonl)"

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trufflehog-findings
          path: trufflehog.jsonl
          retention-days: 90

      - name: File GitHub issue on verified finding
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -s trufflehog.jsonl ]; then
            COUNT=$(wc -l < trufflehog.jsonl)
            TITLE="[SECURITY] Verified live credential(s) detected — ${COUNT} finding(s)"
            BODY=$(cat <<EOF
          **TruffleHog has confirmed ${COUNT} live credential(s) in this repository.**

          This is an active security incident. Follow the runbook:

          1. Identify the leaked credential(s) in the attached artifact.
          2. Revoke immediately via the issuing provider's API.
          3. Rotate any downstream systems that depend on the credential.
          4. Investigate blast radius (logs, audit trails).
          5. Close the issue only when revocation + rotation is confirmed.

          Artifact: \`trufflehog-findings\` on run [#${GH_RUN_ID}](${GH_RUN_URL}).

          _Auto-generated by trufflehog.yml_
          EOF
          )
            gh issue create \
              --repo "$REPO" \
              --title "$TITLE" \
              --body  "$BODY" \
              --label "security,incident,P1"
          else
            echo "No verified findings — nothing to file."
          fi

      - name: Alert #product-security-alerts via Slack (if verified findings)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_REPO: ${{ github.repository }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack alert."
            exit 0
          fi
          if [ -s trufflehog.jsonl ]; then
            COUNT=$(wc -l < trufflehog.jsonl)
            RUN_URL="${GH_RUN_URL}"
            curl -sS -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \":rotating_light: *Verified live credential(s) detected* in \`${GH_REPO}\`\",
                \"blocks\": [
                  {
                    \"type\": \"header\",
                    \"text\": {\"type\": \"plain_text\", \"text\": \":rotating_light: Live Credential Leak Detected\", \"emoji\": true}
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      {\"type\": \"mrkdwn\", \"text\": \"*Repository:*\n\`${GH_REPO}\`\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Findings:*\n${COUNT} verified credential(s)\"}
                    ]
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {\"type\": \"mrkdwn\", \"text\": \":fire: This is an *active security incident*. Revoke the credential(s) immediately, then rotate downstream systems.\"}
                  },
                  {
                    \"type\": \"actions\",
                    \"elements\": [
                      {\"type\": \"button\", \"style\": \"danger\", \"text\": {\"type\": \"plain_text\", \"text\": \"View Run & Artifact\"}, \"url\": \"${RUN_URL}\"}
                    ]
                  }
                ]
              }"
          else
            echo "No verified findings — skipping Slack alert."
          fi
